hugoblox:
  schema: "2.0"
  identity:
    name: Alexandre Amice
    type: person
    tagline: ""
    description: ""
  # theme:
  #   mode: system
  #   pack: minimal
  #   colors:
  #     primary: ""
  #     secondary: ""
  #     neutral: ""
  theme:
    # Mode: 'light', 'dark', or 'system' (follows OS preference)
    mode: dark
    # Theme pack: name from data/themes/ or { light: "x", dark: "y" } for mix-and-match
    pack: "default"
    # Optional: Override theme pack colors
    colors:
      primary: "" # Tailwind palette name or hex (e.g., "indigo" or "#6366f1")
      secondary: ""
      neutral: "" # Affects gray utilities (text-gray-*, bg-gray-*)
    # Optional: Mode-specific color overrides
    colors_light: {}
    colors_dark: {}
    # Optional: Semantic surface color overrides
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""
  typography:
    font: sans
    size: md
  layout:
    radius: md
    spacing: comfortable
    avatar_shape: circle
  header:
    enable: true
    style: navbar
    sticky: true
    align: left
    search: false
    theme_toggle: true
    compact: false

  footer:
    style: minimal
    language_switcher: true
  copyright:
    notice: © {year} {name}
  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true
  search:
    enable: false
  navigation:
    enable: true
